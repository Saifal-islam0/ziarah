<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعيين كلمة مرور جديدة</title>
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/resetPassword.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
    <div class="middle-header">
        <div class="logo">
            <a href="index.html"><img src="assets/logo.png" alt="شعار زيارة"></a>
        </div>
        <div class="search">
            <input type="text" placeholder="ابحث عن طبيب أو خدمة..." id="searchInput" autocomplete="off">
            <div class="search-results-dropdown" id="searchDropdown">
                <div class="search-results-header">
                    <span>
                        <strong id="resultsCount"></strong>
                        &nbsp;لـ "<span id="searchQuery"></span>"
                    </span>
                    <button class="search-close-btn" onclick="closeSearchDropdown()">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="search-loading" id="searchLoading">
                    <div class="search-spinner"></div>
                    <p>جاري البحث...</p>
                </div>
                <div class="search-empty" id="searchEmpty">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <p>لا توجد نتائج مطابقة</p>
                </div>
                <div class="search-results-list" id="searchResultsList"></div>

            </div>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
        </div>
        <div class="lang">
            <i class="fa-solid fa-earth-americas"></i>
            <select>
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>
    <div class="nav-bar">
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="nav">
            <div class="lang-theme">
                <div class="nav-theme" onclick="toggleTheme()">
                    <i class="fa-solid fa-moon" id="navThemeIcon"></i>
                    <span>تغيير الوضع</span>
                </div>
                <div class="nav-lang">
                    <i class="fa-solid fa-earth-americas"></i>
                    <select onchange="changeLang(this.value)">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
            <a href="index.html">الرئيسية</a>
            <div class="list-services">
                <a href="">الخدمات <i class="fa-solid fas fa-angle-down"></i></a>
                <ul class="items-services">
                    <li>طلب طبيب</li>
                    <li>طلب تمريض</li>
                    <li>أخذ عينة</li>
                    <li>علاج طبيعي</li>
                </ul>
            </div>
            <a href="mediCaltips.html">نصائح طبية</a>
            <a href="about.html">من نحن</a>
            <a href="contact.html">تواصل معنا</a>
        </nav>
    </div>
</header>

<div class="reset-box">
    <div class="reset">
        <h2 class="form-title">تعيين كلمة مرور جديدة</h2>
        <p class="form-subtitle">أدخل كلمة المرور ثم تأكيدها.</p>
    </div>

    <div class="reset-form-wrapper">
        <form id="resetForm" method="">
            <div class="password-group">
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" placeholder="كلمة المرور" required>
                        <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <label for="confromPassword">تأكيد كلمة المرور</label>
                        <div class="input-wrapper password-wrapper">
                            <input type="password" id="confromPassword" name="confromPassword" placeholder="تأكيد كلمة المرور" required>
                            <i class="fa-solid fa-eye toggle-password" id="toggleConfromPassword" ></i>
                        </div>
                </div>
            </div>
            <button type="submit" class="submit-btn">تعيين كلمة مرور جديد</button>
        </form>
        <div class="login-link">
            <a href="login.html">تذكرت كلمة المرور؟ سجل الدخول</a>
        </div>
    </div>
</div>
<footer>
    <div class="footer-small">
        <div class="footer-logo">
            <img src="assets/logo.png" alt="">
        </div>
        <p>حقوق النشر والطبع محفوظة زيارة | &copy; 2026</p>
    </div>
</footer>
<script src="js/resetPassword.js"></script>
<script src="js/header.js"></script>

</body>
</html>
